name = "nullclaw-worker"
main = "worker.js"
compatibility_date = "2026-03-05"

# Thin adapter bindings for ingress handoff.
[[kv_namespaces]]
binding = "WHATSAPP_DEDUP"
id = "REPLACE_WITH_KV_ID"

[[d1_databases]]
binding = "TASKS_DB"
database_name = "nullclaw_tasks"
database_id = "REPLACE_WITH_D1_ID"

[[queues.producers]]
binding = "TASK_QUEUE"
queue = "nullclaw-task-queue"
